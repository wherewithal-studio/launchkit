# Canonical: Wherewithal/.github/workflows/deploy-pages-app.yml
name: Deploy to Cloudflare Pages

# Canonical Cloudflare Pages Deployment Workflow for Wherewithal Static Sites
#
# Use this workflow when: Deploying static sites (HTML, React, Vue, Next.js static export)
#                         that are generated at build time and require no backend runtime.
# Projects: Website, Project portfolio sites, Landing pages
# Reference: .github/DEPLOYMENT.md (line 136+), https://developers.cloudflare.com/pages/get-started/guide/

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages-group
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Validate wrangler.toml
        run: |
          if [ ! -f wrangler.toml ]; then
            echo "::error::wrangler.toml not found in project root"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Validate build output
        run: |
          if [ ! -d "dist" ] && [ ! -d "build" ] && [ ! -d "out" ]; then
            echo "::warning::No standard build output directory found (dist/, build/, out/)"
            echo "Ensure your wrangler.toml specifies the correct 'build.upload.dir' path"
          fi

      - name: Extract project name from wrangler.toml
        id: project-name
        run: |
          PROJECT_NAME=$(grep "^name" wrangler.toml | sed 's/^name[ ]*=[ ]*["'"'"']\(.*\)["'"'"']/\1/' | head -1)
          if [ -z "$PROJECT_NAME" ]; then
            echo "::error::Could not extract project name from wrangler.toml"
            exit 1
          fi
          echo "name=${PROJECT_NAME}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          npx wrangler pages deploy --project-name "$PROJECT_NAME"
        env:
          PROJECT_NAME: ${{ steps.project-name.outputs.name }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Report deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✓ Deployment successful"
            echo "  Project: ${PROJECT_NAME}"
            echo "  URL: https://${PROJECT_NAME}.pages.dev"
            echo "  Custom domains: check wrangler.toml [env.production.routes]"
          else
            echo "✗ Deployment failed"
            echo "  Job status: ${{ job.status }}"
            exit 1
          fi
        env:
          PROJECT_NAME: ${{ steps.project-name.outputs.name }}
