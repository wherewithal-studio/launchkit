# Canonical: Wherewithal/.github/workflows/deploy-pages-app.yml
name: Deploy to Cloudflare Pages

# Adapted for static-only sites (no build step)
# Launchkit is a pure static site — deploys public/ directly.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages-group
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate config and output directory
        run: |
          if [ ! -f wrangler.json ] && [ ! -f wrangler.toml ]; then
            echo "::error::Neither wrangler.json nor wrangler.toml found in project root"
            exit 1
          fi
          if [ ! -d "public" ]; then
            echo "::error::public/ directory not found"
            exit 1
          fi
          echo "OK - config and public/ directory exist"

      - name: Extract project name
        id: project-name
        run: |
          if [ -f "wrangler.json" ]; then
            PROJECT_NAME=$(grep -oP '"name"\s*:\s*"\K[^"]+' wrangler.json | head -1)
          else
            PROJECT_NAME=$(grep "^name" wrangler.toml | sed 's/^name[ ]*=[ ]*["'"'"']\(.*\)["'"'"']/\1/' | head -1)
          fi
          if [ -z "$PROJECT_NAME" ]; then
            echo "::error::Could not extract project name from config"
            exit 1
          fi
          echo "name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Project: ${PROJECT_NAME}"

      - name: Deploy to Cloudflare Pages
        env:
          PROJECT_NAME: ${{ steps.project-name.outputs.name }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy public/ --project-name "$PROJECT_NAME"

      - name: Report deployment status
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PROJECT_NAME: ${{ steps.project-name.outputs.name }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            echo "Deployment successful"
            echo "  Project: $PROJECT_NAME"
            echo "  URL: https://launchkit.pages.dev"
          else
            echo "Deployment failed — status: $JOB_STATUS"
            exit 1
          fi
